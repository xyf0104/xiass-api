<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>正在配置 Codex</title>
  <style>
    :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f4f6f8; color: #172033; }
    main { width: min(560px, calc(100% - 32px)); border: 1px solid #d9dee7; border-radius: 8px; background: #fff; padding: 28px; box-shadow: 0 8px 30px rgba(20,30,50,.08); }
    h1 { margin: 0 0 12px; font-size: 21px; }
    p { margin: 0; color: #667085; line-height: 1.65; }
    a { color: #1677ff; }
    .success { color: #176b49; }
    .error { color: #b42318; }
    @media (prefers-color-scheme: dark) { body { background: #11151c; color: #eef2f8; } main { background: #1b212b; border-color: #343d4b; } p { color: #aab4c2; } .success { color: #9ce0c0; } .error { color: #ffc2bd; } }
  </style>
</head>
<body>
  <main>
	<h1 id="title">正在安全配置 Codex...</h1>
	<p id="detail">正在退出 Codex、备份并修复历史会话；全部校验通过后会自动重新启动。</p>
  </main>
  <script>
    function decodeBase64Url(value) {
      const normalized = value.replace(/-/g, '+').replace(/_/g, '/');
      const padding = '='.repeat((4 - normalized.length % 4) % 4);
      const binary = atob(normalized + padding);
      const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    function showResult(title, detail, kind) {
      const titleElement = document.getElementById('title');
      const detailElement = document.getElementById('detail');
      titleElement.textContent = title;
      titleElement.className = kind;
      detailElement.textContent = detail + ' ';
      const link = document.createElement('a');
      link.href = '/';
      link.textContent = '返回配置助手';
      detailElement.append(link);
    }

    async function apply() {
      const params = new URLSearchParams(location.hash.slice(1));
      const state = params.get('state') || '';
      const payload = params.get('payload') || '';
      history.replaceState(null, '', '/callback');
      if (!state || !payload) throw new Error('网站没有返回有效的配置数据。');
      const response = await fetch('/api/apply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-XIASS-Helper-State': state },
        body: decodeBase64Url(payload)
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.message || `配置失败 (${response.status})`);
      showResult('配置成功', data.message, 'success');
    }

    apply().catch(error => {
      showResult('配置未完成', error.message, 'error');
    });
  </script>
</body>
</html>
