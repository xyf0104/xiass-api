<!doctype html>
<html lang="zh-CN" class="dark" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark light" />
    <script nonce="__CSP_NONCE_VALUE__">
      (() => {
        const root = document.documentElement
        let theme = 'dark'

        try {
          if (window.localStorage.getItem('theme') === 'light') {
            theme = 'light'
          }
        } catch {
          // Storage can be unavailable in restricted browser contexts.
        }

        root.classList.toggle('dark', theme === 'dark')
        root.dataset.theme = theme
        const path = window.location.pathname.replace(/\/+$/, '') || '/'
        root.dataset.themeBackground = path === '/' || path === '/home' ? 'clear' : 'blurred'
        root.dataset.themeBooting = 'true'
        root.style.colorScheme = theme
      })()
    </script>
    <style nonce="__CSP_NONCE_VALUE__">
      html,
      body {
        min-height: 100%;
        margin: 0;
        background-color: #061720;
      }

      html[data-theme='light'],
      html[data-theme='light'] body {
        background-color: #cdd8df;
      }

      #theme-boot-background {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        background-color: #061720;
        opacity: 1;
        transition: opacity 180ms ease;
      }

      #theme-boot-background::before {
        position: absolute;
        inset: -24px;
        content: '';
        background: url('/media/xiass-dark-bokeh-poster.png') center / cover no-repeat;
        transform: scale(1.03);
      }

      html[data-theme='light'] #theme-boot-background {
        background-color: #cdd8df;
      }

      html[data-theme='light'] #theme-boot-background::before {
        background-image: url('/media/xiass-light-water-poster.png');
        filter: grayscale(1) brightness(0.7) contrast(3.4) blur(2px);
        mix-blend-mode: screen;
        opacity: 0.72;
      }

      html[data-theme-background='blurred'] #theme-boot-background::before {
        filter: blur(10px) brightness(0.72) saturate(0.92);
        transform: scale(1.06);
      }

      html[data-theme='light'][data-theme-background='blurred'] #theme-boot-background::before {
        filter: grayscale(1) brightness(0.68) contrast(3.2) blur(10px);
        mix-blend-mode: screen;
        opacity: 0.65;
      }

      #app {
        position: relative;
        z-index: 1;
        min-height: 100vh;
      }

      /*
       * Do not let the application paint between the synchronous HTML theme
       * bootstrap and Vue mounting. This prevents a cached stylesheet or a
       * late module from briefly rendering the opposite console theme.
       */
      html[data-theme-booting] #app {
        visibility: hidden;
      }

      html[data-theme-booting],
      html[data-theme-booting] * {
        transition: none !important;
      }

      html:not([data-theme-booting]) #theme-boot-background {
        opacity: 0;
      }
    </style>
    <link rel="icon" type="image/png" href="/favicon-dark.png?v=1.0.68" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=1.0.68" />
    <link rel="manifest" href="/site.webmanifest?v=1.0.68" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XIASS API</title>
  </head>
  <body>
    <div id="theme-boot-background" aria-hidden="true"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
