<!doctype html>
<html lang="zh-CN" class="dark" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark light" />
    <script nonce="__CSP_NONCE_VALUE__">
      (() => {
        const root = document.documentElement
        let theme = 'dark'

        try {
          if (window.localStorage.getItem('theme') === 'light') {
            theme = 'light'
          }
        } catch {
          // Storage can be unavailable in restricted browser contexts.
        }

        root.classList.toggle('dark', theme === 'dark')
        root.dataset.theme = theme
        root.dataset.themeBooting = 'true'
        root.style.colorScheme = theme
      })()
    </script>
    <style nonce="__CSP_NONCE_VALUE__">
      html,
      body {
        background-color: #061720;
      }

      html[data-theme='light'],
      html[data-theme='light'] body {
        background-color: #cdd8df;
      }

      /*
       * Do not let the application paint between the synchronous HTML theme
       * bootstrap and Vue mounting. This prevents a cached stylesheet or a
       * late module from briefly rendering the opposite console theme.
       */
      html[data-theme-booting] #app {
        visibility: hidden;
      }

      html[data-theme-booting],
      html[data-theme-booting] * {
        transition: none !important;
      }
    </style>
    <link rel="icon" type="image/png" href="/favicon-dark.png?v=1.0.68" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=1.0.68" />
    <link rel="manifest" href="/site.webmanifest?v=1.0.68" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XIASS API</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
